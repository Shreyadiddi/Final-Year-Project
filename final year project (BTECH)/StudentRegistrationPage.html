<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="shortcut icon" href="./Black and Ivory Minimalist Monogram Logo.png" type="image/x-icon">
</head>

<body>
    <div class="form-container">
        <h2>Student Registration</h2>
        <form>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="Enter first name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Enter last name" required>
            </div>
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="save-btn">Register</button>
        </form>
        <p class="link-text">
            Already have an account? <a href="StudentLoginpage.html">Login here</a>
        </p>
    </div>
</body>

</html>
