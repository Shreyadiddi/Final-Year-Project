<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Feedback</title>
  <link rel="stylesheet" href="feedback.css">
</head>
<body>
  <div class="container">
    <h1>Student Feedback Form</h1>
    <form id="feedbackForm">
      
      <!-- Feedback on College -->
      <label for="college">Feedback on College:</label>
      <textarea id="college" name="college" placeholder="Write your feedback here..." required></textarea>

      <!-- Feedback on Teaching -->
      <label for="teaching">Feedback on Teaching:</label>
      <textarea id="teaching" name="teaching" placeholder="Write your feedback here..." required></textarea>

      <!-- Feedback on Teachers' Behavior -->
      <label for="behavior">Feedback on Teachers' Behavior:</label>
      <textarea id="behavior" name="behavior" placeholder="Write your feedback here..." required></textarea>

      <!-- Feedback on Facilities -->
      <label for="facilities">Feedback on College Facilities:</label>
      <textarea id="facilities" name="facilities" placeholder="Write your feedback here..." required></textarea>

      <!-- Submit -->
      <button type="submit">Submit Feedback</button>
    </form>
  </div>
</body>
</html>
